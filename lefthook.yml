pre-commit:
  parallel: true
  jobs:
    - name: oxlint
      glob: '*.{ts,tsx}'
      run: npx oxlint --fix --type-aware {staged_files}
      stage_fixed: true

    - name: prettier
      glob: '*.{ts,tsx,js,mjs,cjs,json,md,yml,yaml}'
      run: npx prettier --write {staged_files}
      stage_fixed: true

commit-msg:
  jobs:
    - name: commitlint
      run: npx commitlint --edit {1}
